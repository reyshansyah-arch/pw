<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Mahasiswa - Shan Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login Mahasiswa</h2>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Nama</label>
            <input type="text" id="US" placeholder="Masukkan Nama" 
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Sandi</label>
            <input type="password" id="pass" placeholder="Masukkan Sandi" 
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex gap-4">
            <button id="btnLogin" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                Masuk
            </button>
            <button id="btnCancel" class="w-full bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-600 transition">
                Cancel
            </button>
        </div>

        <p id="message" class="mt-4 text-center text-sm font-medium"></p>
    </div>

    <script>
        // 1. DOM Selector
        const btnLogin = document.getElementById("btnLogin");
        const btnCancel = document.getElementById("btnCancel");
        const US = document.getElementById("US");
        const pass = document.getElementById("pass");
        const message = document.getElementById("message");

        // 2. Event Listener (Jalan Keluar/Fungsi)
        btnLogin.addEventListener("click", function() {
            // Logika fungsi (Contoh mengubah value sesuai catatan US.value = "Username")
            if (US.value === "") {
                US.value = "Username"; // Mengisi otomatis jika kosong (sesuai catatan)
                message.innerText = "Sandi atau Nama tidak boleh kosong!";
                message.className = "mt-4 text-center text-sm text-red-500";
            } else {
                alert("Selamat Datang, " + US.value + "!");
                message.innerText = "Login Berhasil!";
                message.className = "mt-4 text-center text-sm text-green-500";
            }
        });

        // Event untuk tombol Cancel
        btnCancel.addEventListener("click", function() {
            US.value = "";
            pass.value = "";
            message.innerText = "Input dibersihkan.";
            message.className = "mt-4 text-center text-sm text-gray-500";
        });
    </script>
</body>
</html>
